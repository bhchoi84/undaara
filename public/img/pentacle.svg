<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d77a"/>
      <stop offset="50%" stop-color="#e1c471"/>
      <stop offset="100%" stop-color="#c4a24e"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
  </defs>
  <!-- Outer coin ring -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGrad)" stroke="url(#coinEdge)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="#c4a24e" stroke-width="1" opacity="0.6"/>
  <!-- Pentagram star -->
  <polygon points="32,8 37.5,23 54,23 40.5,33 45.5,48 32,38 18.5,48 23.5,33 10,23 26.5,23"
    fill="none" stroke="#8B6914" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner circle around star -->
  <circle cx="32" cy="30" r="16" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
</svg>
